<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Dados da Stack</title><desc id="desc">Tela ilustrativa dos campos Name, compartment, description e Terraform version.</desc>
  <defs><style>.t{font:14px Arial;fill:#211f1d}.s{font:12px Arial;fill:#6b6661}.h{font:bold 28px Arial;fill:#211f1d}.h2{font:bold 17px Arial;fill:#211f1d}.label{font:bold 12px Arial;fill:#312d2a}.call{font:13px Arial;fill:#fff}</style></defs>
  <rect width="1200" height="720" fill="#f4f4f4"/><rect width="1200" height="54" fill="#fff"/><text x="25" y="34" font-family="Arial" font-size="22" font-weight="bold" fill="#c74634">ORACLE</text><text x="139" y="33" class="h2">Cloud Infrastructure</text><rect y="54" width="1200" height="42" fill="#fff"/><text x="25" y="80" class="s">Create stack / Stack information</text>
  <rect x="0" y="96" width="235" height="624" fill="#fff"/><text x="20" y="130" class="s">CREATE STACK</text><rect x="16" y="153" width="203" height="37" fill="#fbeeea"/><text x="32" y="177" class="t" font-weight="bold">1. Stack information</text><text x="32" y="218" class="t">2. Configure variables</text><text x="32" y="259" class="t">3. Review</text>
  <text x="270" y="145" class="h">Stack information</text><rect x="270" y="185" width="880" height="390" rx="4" fill="#fff" stroke="#d8d4cf"/>
  <text x="295" y="224" class="label">Name *</text><rect x="295" y="238" width="390" height="43" rx="3" fill="#fff" stroke="#8b8580"/><text x="310" y="264" class="t">hermes-oci-workshop</text>
  <text x="735" y="224" class="label">Create in compartment *</text><rect x="735" y="238" width="390" height="43" rx="3" fill="#fff" stroke="#8b8580"/><text x="750" y="264" class="t">workshop-lab ▾</text>
  <text x="295" y="320" class="label">Description</text><rect x="295" y="334" width="390" height="43" rx="3" fill="#fff" stroke="#8b8580"/><text x="310" y="360" class="t">Hermes Agent + OCI GenAI + Telegram</text>
  <text x="735" y="320" class="label">Terraform version *</text><rect x="735" y="334" width="390" height="43" rx="3" fill="#fff" stroke="#8b8580"/><text x="750" y="360" class="t">Latest supported 1.x (>= 1.5 and &lt; 2.0) ▾</text>
  <text x="295" y="419" class="h2">Tags (optional)</text><rect x="295" y="441" width="390" height="43" rx="3" fill="#f7f7f7" stroke="#c1bdb8"/><text x="310" y="467" class="s">Namespace / Key</text><rect x="735" y="441" width="390" height="43" rx="3" fill="#f7f7f7" stroke="#c1bdb8"/><text x="750" y="467" class="s">Value</text>
  <rect x="295" y="512" width="84" height="39" rx="3" fill="#c74634"/><text x="319" y="537" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Next</text>
  <rect x="270" y="625" width="880" height="58" rx="4" fill="#312d2a"/><text x="290" y="651" class="call">Use uma versão Terraform <tspan font-weight="bold" fill="#f8cf75">1.x compatível com >= 1.5 e &lt; 2.0</tspan>. Depois clique em Next.</text><text x="1002" y="675" class="s">Tela ilustrativa</text>
</svg>
