<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Download direto do ZIP no GitHub</title><desc id="desc">Tela ilustrativa do arquivo ZIP pronto para download direto no repositório do workshop.</desc>
  <defs><style>.t{font:14px Arial;fill:#24292f}.s{font:12px Arial;fill:#656d76}.h{font:bold 28px Arial;fill:#24292f}.h2{font:bold 17px Arial;fill:#24292f}.bold{font-weight:bold}.call{font:13px Arial;fill:#fff}.mono{font:13px Consolas,monospace;fill:#24292f}</style></defs>
  <rect width="1200" height="720" fill="#f6f8fa"/><rect width="1200" height="58" fill="#24292f"/><text x="25" y="37" font-family="Arial" font-size="19" font-weight="bold" fill="#fff">GitHub Releases</text><text x="205" y="37" font-family="Arial" font-size="14" fill="#fff">rafaelrdias / oci-hermes-workshop</text>
  <rect x="25" y="82" width="1150" height="42" rx="6" fill="#fff" stroke="#d0d7de"/><text x="44" y="108" class="mono">workshop-terraform-ord-v2 / oci-hermes-resource-manager.zip</text>
  <text x="50" y="180" class="h">Terraform pronto para o Resource Manager</text><text x="50" y="213" class="s">Asset da GitHub Release · download como attachment · sem terraform.tfvars, state ou segredos</text>
  <rect x="50" y="252" width="1100" height="214" rx="6" fill="#fff" stroke="#d0d7de"/>
  <circle cx="115" cy="326" r="40" fill="#ddf4ff"/><path d="M115 300 V337 M99 322 L115 338 L131 322 M94 350 H136" fill="none" stroke="#0969da" stroke-width="5" stroke-linecap="round"/>
  <text x="180" y="310" class="h2">oci-hermes-resource-manager.zip</text><text x="180" y="342" class="s">Pacote completo para My configuration → .Zip file</text><text x="180" y="373" class="s">O download começa no navegador; não é necessário clonar o GitHub.</text>
  <rect x="820" y="302" width="267" height="52" rx="6" fill="#1f883d"/><text x="864" y="335" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">Baixar ZIP pronto</text>
  <rect x="50" y="492" width="1100" height="70" fill="#fff8c5" stroke="#d4a72c"/><text x="75" y="519" class="t bold">Depois do download</text><text x="75" y="545" class="t">Não descompacte. Envie o próprio arquivo .zip ao OCI Resource Manager.</text>
  <rect x="50" y="626" width="1100" height="58" rx="4" fill="#312d2a"/><text x="72" y="651" class="call"><tspan font-weight="bold" fill="#f8cf75">Download forçado:</tspan> o GitHub entrega o asset com o nome oci-hermes-resource-manager.zip.</text><text x="1010" y="675" class="s">Tela ilustrativa</text>
</svg>
