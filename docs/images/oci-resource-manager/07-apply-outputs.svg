  <rect width="1200" height="720" fill="#f4f4f4"/><rect width="1200" height="54" fill="#fff"/><text x="25" y="34" font-family="Arial" font-size="22" font-weight="bold" fill="#c74634">ORACLE</text><text x="139" y="33" class="t bold">Cloud Infrastructure</text><rect y="54" width="1200" height="42" fill="#fff"/><text x="25" y="80" class="s">Stack / hermes-oci-workshop / Jobs / apply-01</text>
  <rect x="0" y="96" width="235" height="624" fill="#fff"/><text x="20" y="130" class="s">JOB RESOURCES</text><text x="25" y="171" class="t">Job information</text><text x="25" y="208" class="t">Logs</text><rect x="10" y="225" width="215" height="35" fill="#fbeeea"/><text x="25" y="248" class="t bold">Outputs</text><text x="25" y="285" class="t">Job resources</text><text x="25" y="322" class="t">View state</text>
  <text x="270" y="142" class="h">Apply job</text>
  <rect x="270" y="167" width="260" height="70" fill="#fff" stroke="#d8d4cf"/><rect x="290" y="183" width="93" height="24" rx="12" fill="#e5f5ef"/><text x="304" y="200" class="s bold" fill="#176b50">SUCCEEDED</text><text x="290" y="224" class="s">Lifecycle state</text>
  <rect x="550" y="167" width="260" height="70" fill="#fff" stroke="#d8d4cf"/><text x="570" y="197" class="h2">APPLY</text><text x="570" y="220" class="s">Operation</text><rect x="830" y="167" width="320" height="70" fill="#fff" stroke="#d8d4cf"/><text x="850" y="197" class="t bold">plan-hermes-oci-workshop-01</text><text x="850" y="220" class="s">Apply job plan resolution</text>
  <rect x="270" y="260" width="880" height="40" fill="#fff"/><text x="295" y="285" class="t">Logs</text><text x="390" y="285" class="t bold" fill="#8f2d20">Outputs</text><line x1="378" y1="298" x2="455" y2="298" stroke="#c74634" stroke-width="3"/><text x="485" y="285" class="t">Job resources</text><text x="605" y="285" class="t">View state</text>
  <rect x="270" y="316" width="880" height="207" fill="#fff" stroke="#d8d4cf"/><rect x="270" y="316" width="880" height="38" fill="#f5f4f2"/><text x="290" y="340" class="s bold">OUTPUT</text><text x="530" y="340" class="s bold">VALUE (EXAMPLE)</text>
  <text x="290" y="382" class="t bold">public_ip</text><text x="530" y="382" class="t">198.51.100.24</text><line x1="270" y1="398" x2="1150" y2="398" stroke="#e1ded9"/><text x="290" y="426" class="t bold">ssh_command</text><text x="530" y="426" class="t">ssh -i &lt;private-key-file&gt; opc@198.51.100.24</text><line x1="270" y1="442" x2="1150" y2="442" stroke="#e1ded9"/><text x="290" y="470" class="t bold">genai_model</text><text x="530" y="470" class="t">openai.gpt-oss-120b</text><line x1="270" y1="486" x2="1150" y2="486" stroke="#e1ded9"/><text x="290" y="512" class="t bold">genai_base_url</text><text x="530" y="512" class="t">https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/...</text>
  <rect x="270" y="544" width="880" height="78" rx="3" fill="#211f1d"/><text x="290" y="570" class="mono" fill="#f8cf75"># Depois do SUCCEEDED</text><text x="290" y="592" class="mono">ssh -i &lt;chave&gt; opc@&lt;public_ip&gt; 'cloud-init status --wait'</text><text x="290" y="612" class="mono">ssh -i &lt;chave&gt; opc@&lt;public_ip&gt; 'sudo tail -n 80 /var/log/hermes-bootstrap.log'</text>
  <rect x="270" y="640" width="880" height="55" rx="4" fill="#312d2a"/><text x="290" y="666" class="call">Clique em Apply, selecione o último Plan e aguarde <tspan font-weight="bold" fill="#f8cf75">SUCCEEDED</tspan>. Depois abra Outputs.</text><text x="1002" y="686" class="s">Tela ilustrativa</text>
