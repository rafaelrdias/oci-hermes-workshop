<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Gerar e baixar o par de chaves SSH</title><desc id="desc">Tela ilustrativa do assistente Create instance com Generate a key pair for me, Save Private Key, Save Public Key e Cancel.</desc>
  <defs><style>.t{font:14px Arial;fill:#211f1d}.s{font:12px Arial;fill:#6b6661}.h{font:bold 28px Arial;fill:#211f1d}.h2{font:bold 17px Arial;fill:#211f1d}.bold{font-weight:bold}.call{font:13px Arial;fill:#fff}</style></defs>
  <rect width="1200" height="720" fill="#f4f4f4"/><rect width="1200" height="54" fill="#fff"/><text x="25" y="34" font-family="Arial" font-size="22" font-weight="bold" fill="#c74634">ORACLE</text><text x="139" y="33" class="h2">Cloud Infrastructure</text><rect x="949" y="12" width="185" height="31" rx="3" fill="#f3f2f1"/><text x="968" y="32" class="s">US Midwest (Chicago)</text><rect y="54" width="1200" height="42" fill="#fff"/><text x="25" y="80" class="s">Compute / Instances / Create instance</text>
  <rect x="0" y="96" width="235" height="624" fill="#fff"/><text x="20" y="130" class="s">CREATE INSTANCE</text><text x="32" y="172" class="t">1. Basic information</text><text x="32" y="211" class="t">2. Security</text><rect x="16" y="230" width="203" height="38" fill="#fbeeea"/><text x="32" y="255" class="t bold">Add SSH keys</text><text x="32" y="300" class="t">4. Networking</text><text x="32" y="340" class="t">5. Storage</text>
  <text x="270" y="142" class="h">Add SSH keys</text><rect x="270" y="175" width="880" height="359" rx="5" fill="#fff" stroke="#d8d4cf"/>
  <circle cx="302" cy="224" r="8" fill="#fff" stroke="#c74634" stroke-width="3"/><circle cx="302" cy="224" r="3" fill="#c74634"/><text x="326" y="230" class="t bold">Generate a key pair for me</text><text x="326" y="255" class="s">OCI gera um par OpenSSH. Baixe as duas partes antes de sair.</text>
  <rect x="326" y="292" width="214" height="46" rx="3" fill="#fff" stroke="#8b8580"/><text x="370" y="321" class="t bold">Save Private Key</text><circle cx="554" cy="291" r="17" fill="#312d2a"/><text x="549" y="297" font-family="Arial" font-weight="bold" fill="#fff">1</text>
  <rect x="568" y="292" width="214" height="46" rx="3" fill="#fff" stroke="#8b8580"/><text x="614" y="321" class="t bold">Save Public Key</text><circle cx="796" cy="291" r="17" fill="#312d2a"/><text x="791" y="297" font-family="Arial" font-weight="bold" fill="#fff">2</text>
  <rect x="326" y="372" width="760" height="84" fill="#fff8c5" stroke="#d4a72c"/><text x="350" y="402" class="t bold">Guarde com segurança</text><text x="350" y="429" class="t">Private Key: usada no comando ssh. Public Key (.pub): colada em ssh_public_key.</text>
  <rect x="270" y="559" width="880" height="58" fill="#fff0ee"/><rect x="270" y="559" width="5" height="58" fill="#b33125"/><text x="294" y="584" class="t bold">Depois de salvar as duas chaves, clique em Cancel.</text><text x="294" y="605" class="s">Não clique em Create: a VM será criada pelo Terraform.</text><rect x="965" y="570" width="116" height="38" rx="3" fill="#fff" stroke="#8b8580"/><text x="1000" y="594" class="t bold">Cancel</text><circle cx="1092" cy="570" r="17" fill="#312d2a"/><text x="1087" y="576" font-family="Arial" font-weight="bold" fill="#fff">3</text>
  <rect x="270" y="640" width="880" height="55" rx="4" fill="#312d2a"/><text x="292" y="666" class="call">Abra o arquivo <tspan font-weight="bold" fill="#f8cf75">.pub</tspan> num editor de texto e copie a linha inteira.</text><text x="1002" y="686" class="s">Tela ilustrativa</text>
</svg>
