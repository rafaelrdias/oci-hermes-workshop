<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Seleção da pasta Terraform</title><desc id="desc">Tela ilustrativa do Create stack com My configuration e Folder selecionados.</desc>
  <defs><style>.t{font:14px Arial;fill:#211f1d}.s{font:12px Arial;fill:#6b6661}.h{font:bold 28px Arial;fill:#211f1d}.h2{font:bold 17px Arial;fill:#211f1d}.nav{font:13px Arial;fill:#312d2a}.bold{font-weight:bold}.call{font:13px Arial;fill:#fff}</style></defs>
  <rect width="1200" height="720" fill="#f4f4f4"/><rect width="1200" height="54" fill="#fff"/><text x="25" y="34" font-family="Arial" font-size="22" font-weight="bold" fill="#c74634">ORACLE</text><text x="139" y="33" class="h2">Cloud Infrastructure</text>
  <rect y="54" width="1200" height="42" fill="#fff"/><text x="25" y="80" class="s">Resource Manager / Stacks / Create stack</text><rect x="0" y="96" width="235" height="624" fill="#fff"/>
  <text x="20" y="130" class="s bold">DEVELOPER SERVICES</text><rect x="10" y="150" width="215" height="37" fill="#fbeeea"/><rect x="10" y="150" width="4" height="37" fill="#c74634"/><text x="25" y="174" class="nav bold">Resource Manager</text><text x="42" y="214" class="nav bold">Stacks</text>
  <text x="270" y="145" class="h">Create stack</text><text x="270" y="175" class="s">Choose the origin of the Terraform configuration.</text>
  <rect x="270" y="200" width="880" height="396" rx="4" fill="#fff" stroke="#d8d4cf"/><text x="295" y="238" class="h2">Stack configuration</text>
  <circle cx="307" cy="276" r="8" fill="#fff" stroke="#c74634" stroke-width="2"/><circle cx="307" cy="276" r="4" fill="#c74634"/><text x="326" y="281" class="t bold">My configuration</text>
  <circle cx="515" cy="276" r="8" fill="#fff" stroke="#888"/><text x="534" y="281" class="t">Template</text><circle cx="669" cy="276" r="8" fill="#fff" stroke="#888"/><text x="688" y="281" class="t">Source code control system</text>
  <text x="295" y="326" class="s bold">CONFIGURATION TYPE</text><circle cx="307" cy="354" r="8" fill="#fff" stroke="#c74634" stroke-width="2"/><circle cx="307" cy="354" r="4" fill="#c74634"/><text x="326" y="359" class="t bold">Folder</text>
  <rect x="295" y="384" width="830" height="146" rx="4" fill="#fafafa" stroke="#aaa39c" stroke-width="2" stroke-dasharray="7 5"/><text x="500" y="424" class="t bold">Select a folder containing the Terraform configuration</text><text x="620" y="449" class="s">select Browse</text>
  <rect x="420" y="470" width="580" height="39" rx="3" fill="#fff" stroke="#9c9690"/><text x="441" y="495" class="t">oci-hermes-workshop-resource-manager-folder</text><text x="964" y="495" font-family="Arial" font-size="16" fill="#147d64">✓</text>
  <rect x="295" y="551" width="16" height="16" fill="#fff" stroke="#777"/><text x="323" y="564" class="t">Use custom providers</text><text x="488" y="564" class="s">(deixe desmarcado)</text>
  <rect x="270" y="625" width="880" height="58" rx="4" fill="#312d2a"/><text x="290" y="649" class="call"><tspan font-weight="bold" fill="#f8cf75">Pasta:</tspan> oci-hermes-workshop-resource-manager-folder (~60 KB)</text><text x="290" y="670" class="call">Não selecione o repositório completo, .terraform, state, chave privada ou segredos.</text><text x="1002" y="675" class="s">Tela ilustrativa</text>
</svg>
