<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Destroy da Stack</title><desc id="desc">Tela ilustrativa do Destroy e da ordem correta para remover recursos e Stack.</desc>
  <defs><style>.t{font:14px Arial;fill:#211f1d}.s{font:12px Arial;fill:#6b6661}.h{font:bold 28px Arial;fill:#211f1d}.h2{font:bold 17px Arial;fill:#211f1d}.bold{font-weight:bold}.call{font:13px Arial;fill:#fff}</style></defs>
  <rect width="1200" height="720" fill="#f4f4f4"/><rect width="1200" height="54" fill="#fff"/><text x="25" y="34" font-family="Arial" font-size="22" font-weight="bold" fill="#c74634">ORACLE</text><text x="139" y="33" class="h2">Cloud Infrastructure</text><rect y="54" width="1200" height="42" fill="#fff"/><text x="25" y="80" class="s">Stack / hermes-oci-workshop / Destroy</text>
  <rect x="0" y="96" width="235" height="624" fill="#fff"/><text x="20" y="130" class="s">STACK RESOURCES</text><text x="25" y="171" class="t">Stack information</text><text x="25" y="208" class="t">Jobs</text><text x="25" y="245" class="t">Variables</text><text x="25" y="282" class="t">Stack resources</text>
  <text x="270" y="142" class="h">Destroy resources</text><rect x="270" y="164" width="880" height="57" fill="#fff0ee"/><rect x="270" y="164" width="5" height="57" fill="#b33125"/><text x="291" y="188" class="t bold">Atenção: Destroy libera os recursos controlados pela Stack.</text><text x="291" y="207" class="s">Dados na VM serão perdidos. Faça backup antes, se necessário.</text>
  <rect x="270" y="243" width="880" height="246" rx="4" fill="#fff" stroke="#d8d4cf"/><text x="295" y="280" class="h2">Create destroy job</text><text x="295" y="316" class="s bold">JOB NAME</text><rect x="295" y="330" width="830" height="42" rx="3" fill="#fff" stroke="#8b8580"/><text x="310" y="356" class="t">destroy-hermes-oci-workshop-01</text>
  <rect x="295" y="396" width="17" height="17" fill="#c74634" stroke="#c74634"/><text x="298" y="409" font-family="Arial" font-size="13" fill="#fff">✓</text><text x="325" y="410" class="t">Refresh resource states before checking for differences</text>
  <rect x="295" y="438" width="92" height="38" rx="3" fill="#c74634"/><text x="312" y="462" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Destroy</text>
  <text x="270" y="530" class="h2">Ordem correta</text><rect x="270" y="548" width="276" height="72" fill="#fff" stroke="#d8d4cf"/><text x="290" y="578" class="h2">1. Destroy</text><text x="290" y="601" class="s">Aguarde SUCCEEDED</text><rect x="566" y="548" width="276" height="72" fill="#fff" stroke="#d8d4cf"/><text x="586" y="578" class="h2">2. Verify</text><text x="586" y="601" class="s">Stack resources vazia</text><rect x="862" y="548" width="288" height="72" fill="#fff" stroke="#d8d4cf"/><text x="882" y="578" class="h2">3. Delete stack</text><text x="882" y="601" class="s">Remove state e histórico</text>
  <rect x="270" y="640" width="880" height="55" rx="4" fill="#312d2a"/><text x="290" y="666" class="call">Execute <tspan font-weight="bold" fill="#f8cf75">Destroy antes de Delete stack</tspan>. Excluir somente a Stack perde o state e pode deixar recursos.</text><text x="1002" y="686" class="s">Tela ilustrativa</text>
</svg>
