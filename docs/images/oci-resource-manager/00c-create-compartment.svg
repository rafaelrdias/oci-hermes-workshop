<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Criar um compartment</title><desc id="desc">Tela ilustrativa da Console OCI para criar o compartment do workshop.</desc>
  <defs><style>.t{font:14px Arial;fill:#211f1d}.s{font:12px Arial;fill:#6b6661}.h{font:bold 28px Arial;fill:#211f1d}.h2{font:bold 17px Arial;fill:#211f1d}.bold{font-weight:bold}.call{font:13px Arial;fill:#fff}</style></defs>
  <rect width="1200" height="720" fill="#f4f4f4"/><rect width="1200" height="54" fill="#fff"/><text x="25" y="34" font-family="Arial" font-size="22" font-weight="bold" fill="#c74634">ORACLE</text><text x="139" y="33" class="h2">Cloud Infrastructure</text><rect y="54" width="1200" height="42" fill="#fff"/><text x="25" y="80" class="s">Identity &amp; Security / Compartments / Create compartment</text>
  <rect x="0" y="96" width="235" height="624" fill="#fff"/><text x="20" y="130" class="s bold">IDENTITY &amp; SECURITY</text><rect x="12" y="153" width="210" height="38" fill="#fbeeea"/><text x="30" y="177" class="t bold">Identity</text><text x="45" y="218" class="t">Domains</text><rect x="30" y="235" width="192" height="36" fill="#fbeeea"/><text x="48" y="258" class="t bold">Compartments</text><text x="45" y="298" class="t">Policies</text>
  <text x="270" y="142" class="h">Create compartment</text><rect x="270" y="176" width="880" height="388" rx="5" fill="#fff" stroke="#d8d4cf"/>
  <text x="295" y="218" class="s bold">NAME *</text><rect x="295" y="232" width="390" height="45" rx="3" fill="#fff" stroke="#8b8580"/><text x="312" y="260" class="t">hermes-workshop-RD</text><text x="720" y="218" class="s bold">PARENT COMPARTMENT *</text><rect x="720" y="232" width="390" height="45" rx="3" fill="#fff" stroke="#8b8580"/><text x="737" y="260" class="t">trial-workshop (root) ▾</text>
  <text x="295" y="323" class="s bold">DESCRIPTION *</text><rect x="295" y="337" width="815" height="72" rx="3" fill="#fff" stroke="#8b8580"/><text x="312" y="376" class="t">Recursos do laboratório Hermes no TDC</text><text x="295" y="447" class="s">Use suas iniciais no nome para evitar conflito com outros participantes.</text>
  <rect x="295" y="492" width="148" height="43" rx="3" fill="#c74634"/><text x="315" y="519" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Create compartment</text><circle cx="460" cy="493" r="17" fill="#312d2a"/><text x="455" y="499" font-family="Arial" font-weight="bold" fill="#fff">1</text>
  <rect x="270" y="588" width="880" height="36" fill="#edf6fb"/><text x="292" y="611" class="t">Se Create compartment não estiver disponível, use o compartment fornecido pelo facilitador.</text>
  <rect x="270" y="640" width="880" height="55" rx="4" fill="#312d2a"/><text x="292" y="666" class="call">Aguarde o lifecycle state <tspan font-weight="bold" fill="#f8cf75">ACTIVE</tspan> antes de abrir os detalhes.</text><text x="1002" y="686" class="s">Tela ilustrativa</text>
</svg>
