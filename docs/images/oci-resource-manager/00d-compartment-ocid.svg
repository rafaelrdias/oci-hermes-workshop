<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Copiar o Compartment OCID</title><desc id="desc">Tela ilustrativa dos detalhes do compartment com lifecycle state Active e botão Copy no OCID.</desc>
  <defs><style>.t{font:14px Arial;fill:#211f1d}.s{font:12px Arial;fill:#6b6661}.h{font:bold 28px Arial;fill:#211f1d}.h2{font:bold 17px Arial;fill:#211f1d}.bold{font-weight:bold}.call{font:13px Arial;fill:#fff}.mono{font:13px Consolas,monospace;fill:#312d2a}</style></defs>
  <rect width="1200" height="720" fill="#f4f4f4"/><rect width="1200" height="54" fill="#fff"/><text x="25" y="34" font-family="Arial" font-size="22" font-weight="bold" fill="#c74634">ORACLE</text><text x="139" y="33" class="h2">Cloud Infrastructure</text><rect y="54" width="1200" height="42" fill="#fff"/><text x="25" y="80" class="s">Identity &amp; Security / Compartments / hermes-workshop-RD</text>
  <rect x="0" y="96" width="235" height="624" fill="#fff"/><text x="20" y="130" class="s">COMPARTMENT RESOURCES</text><rect x="12" y="151" width="210" height="37" fill="#fbeeea"/><text x="30" y="175" class="t bold">Compartment information</text><text x="30" y="218" class="t">Policies</text><text x="30" y="258" class="t">Tag defaults</text>
  <text x="270" y="142" class="h">hermes-workshop-RD</text><rect x="270" y="169" width="110" height="28" rx="14" fill="#e5f5ef"/><text x="300" y="188" class="s bold" fill="#176b50">ACTIVE</text>
  <rect x="270" y="225" width="880" height="300" rx="5" fill="#fff" stroke="#d8d4cf"/><text x="295" y="266" class="h2">Compartment information</text><text x="295" y="315" class="s bold">COMPARTMENT OCID</text><rect x="295" y="330" width="655" height="48" rx="3" fill="#f7f7f7" stroke="#c1bdb8"/><text x="312" y="360" class="mono">ocid1.compartment.oc1..EXEMPLO</text><rect x="970" y="330" width="130" height="48" rx="3" fill="#fff" stroke="#8b8580"/><text x="1010" y="360" class="t bold">Copy</text><circle cx="1110" cy="330" r="17" fill="#312d2a"/><text x="1105" y="336" font-family="Arial" font-weight="bold" fill="#fff">1</text>
  <text x="295" y="430" class="s bold">PARENT COMPARTMENT</text><text x="295" y="459" class="t">trial-workshop (root)</text><text x="295" y="495" class="s">Cole o valor copiado em compartment_ocid na Stack.</text>
  <rect x="270" y="565" width="880" height="58" fill="#fff8c5" stroke="#d4a72c"/><text x="292" y="591" class="t bold">Não confunda:</text><text x="405" y="591" class="t">o Tenancy OCID contém “tenancy”; este contém “compartment”.</text>
  <rect x="270" y="640" width="880" height="55" rx="4" fill="#312d2a"/><text x="292" y="666" class="call"><tspan font-weight="bold" fill="#f8cf75">Resultado:</tspan> compartment_ocid copiado e pronto para o formulário do Terraform.</text><text x="1002" y="686" class="s">Tela ilustrativa</text>
</svg>
