<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Configurar variáveis Terraform</title><desc id="desc">Tela ilustrativa das variáveis principais do workshop, sem segredos.</desc>
  <defs><style>.t{font:13px Arial;fill:#211f1d}.s{font:11px Arial;fill:#6b6661}.h{font:bold 28px Arial;fill:#211f1d}.th{font:bold 11px Arial;fill:#5e5854}.bold{font-weight:bold}.call{font:13px Arial;fill:#fff}</style></defs>
  <rect width="1200" height="720" fill="#f4f4f4"/><rect width="1200" height="54" fill="#fff"/><text x="25" y="34" font-family="Arial" font-size="22" font-weight="bold" fill="#c74634">ORACLE</text><text x="139" y="33" class="t bold">Cloud Infrastructure</text><rect y="54" width="1200" height="42" fill="#fff"/><text x="25" y="80" class="s">Create stack / Configure variables</text>
  <rect x="0" y="96" width="235" height="624" fill="#fff"/><text x="20" y="130" class="s">CREATE STACK</text><text x="32" y="174" class="t">✓ Stack information</text><rect x="16" y="193" width="203" height="37" fill="#fbeeea"/><text x="32" y="217" class="t bold">2. Configure variables</text><text x="32" y="258" class="t">3. Review</text>
  <text x="270" y="142" class="h">Configure variables</text><rect x="270" y="163" width="880" height="55" fill="#fff0ee"/><rect x="270" y="163" width="5" height="55" fill="#b33125"/><text x="290" y="187" class="t bold">Nunca cole segredos aqui.</text><text x="290" y="205" class="s">API key OCI, token do Telegram e chave SSH privada não pertencem ao state.</text>
  <rect x="270" y="238" width="880" height="325" fill="#fff" stroke="#d8d4cf"/><rect x="270" y="238" width="880" height="40" fill="#f5f4f2"/><text x="290" y="263" class="th">VARIABLE</text><text x="482" y="263" class="th">WORKSHOP VALUE</text><text x="910" y="263" class="th">NOTES</text>
  <g stroke="#e1ded9"><line x1="270" y1="324" x2="1150" y2="324"/><line x1="270" y1="370" x2="1150" y2="370"/><line x1="270" y1="416" x2="1150" y2="416"/><line x1="270" y1="462" x2="1150" y2="462"/><line x1="270" y1="508" x2="1150" y2="508"/></g>
  <text x="290" y="307" class="t bold">region</text><text x="482" y="307" class="t">us-chicago-1</text><text x="910" y="307" class="s">VM e rede em ORD</text>
  <text x="290" y="353" class="t bold">tenancy_ocid</text><text x="482" y="353" class="t">ocid1.tenancy...EXEMPLO</text><text x="910" y="353" class="s">OCID, não segredo</text>
  <text x="290" y="399" class="t bold">compartment_ocid</text><text x="482" y="399" class="t">ocid1.compartment...EXEMPLO</text><text x="910" y="399" class="s">Onde criar recursos</text>
  <text x="290" y="445" class="t bold">ssh_public_key</text><text x="482" y="445" class="t">ssh-ed25519 AAAA... participante</text><text x="910" y="445" class="s">Somente .pub</text>
  <text x="290" y="491" class="t bold">ssh_allowed_cidr</text><text x="482" y="491" class="t">203.0.113.10/32</text><text x="910" y="491" class="s">Seu IP + /32</text>
  <text x="290" y="537" class="t bold">genai_region</text><text x="482" y="537" class="t">us-chicago-1</text><text x="910" y="537" class="s">Mesmo ORD da VM</text>
  <rect x="270" y="582" width="84" height="38" rx="3" fill="#c74634"/><text x="295" y="607" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Next</text>
  <rect x="270" y="640" width="880" height="55" rx="4" fill="#312d2a"/><text x="290" y="665" class="call">Chave pública, nunca privada. Restrinja SSH ao seu IP <tspan font-weight="bold" fill="#f8cf75">/32</tspan>.</text><text x="1002" y="685" class="s">Tela ilustrativa</text>
</svg>
