<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Baixar a pasta Terraform leve</title><desc id="desc">Fluxo ilustrativo do download da branch leve até a pasta usada no OCI Resource Manager.</desc>
  <defs><style>.t{font:14px Arial;fill:#24292f}.s{font:12px Arial;fill:#656d76}.h{font:bold 28px Arial;fill:#24292f}.h2{font:bold 17px Arial;fill:#24292f}.bold{font-weight:bold}.call{font:13px Arial;fill:#fff}.mono{font:13px Consolas,monospace;fill:#24292f}</style></defs>
  <rect width="1200" height="720" fill="#f6f8fa"/><rect width="1200" height="58" fill="#24292f"/><text x="25" y="37" font-family="Arial" font-size="19" font-weight="bold" fill="#fff">GitHub</text><text x="112" y="37" font-family="Arial" font-size="14" fill="#fff">rafaelrdias / oci-hermes-workshop</text>
  <rect x="25" y="82" width="1150" height="42" rx="6" fill="#fff" stroke="#d0d7de"/><text x="44" y="108" class="mono">github.com/rafaelrdias/oci-hermes-workshop</text>
  <text x="50" y="174" class="h">Use a pasta Terraform leve — cerca de 60 KB</text><text x="50" y="207" class="s">A branch dedicada exclui apresentações, .terraform, providers locais, state e segredos.</text>
  <rect x="50" y="244" width="248" height="170" rx="6" fill="#fff" stroke="#d0d7de"/><circle cx="78" cy="276" r="16" fill="#0969da"/><text x="73" y="282" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">1</text><text x="110" y="282" class="h2">Baixe a pasta leve</text><rect x="84" y="316" width="180" height="43" rx="6" fill="#1f883d"/><text x="103" y="343" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Download Terraform</text><text x="84" y="386" class="s">Branch resource-manager-folder.</text>
  <path d="M312 329 H356" stroke="#656d76" stroke-width="4"/><path d="M356 329 l-12 -8 v16 z" fill="#656d76"/>
  <rect x="370" y="244" width="360" height="170" rx="6" fill="#fff" stroke="#d0d7de"/><circle cx="398" cy="276" r="16" fill="#8250df"/><text x="393" y="282" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">2</text><text x="430" y="282" class="h2">Extraia uma vez</text><text x="402" y="326" class="mono">oci-hermes-workshop-</text><text x="402" y="352" class="mono">resource-manager-folder/</text><text x="402" y="386" class="s">main.tf e files/ ficam na raiz.</text>
  <path d="M744 329 H788" stroke="#656d76" stroke-width="4"/><path d="M788 329 l-12 -8 v16 z" fill="#656d76"/>
  <rect x="802" y="244" width="348" height="170" rx="6" fill="#fff" stroke="#d0d7de"/><circle cx="830" cy="276" r="16" fill="#bf8700"/><text x="825" y="282" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">3</text><text x="862" y="282" class="h2">Selecione no OCI</text><text x="834" y="326" class="t bold">My configuration → Folder</text><text x="834" y="356" class="mono">resource-manager-folder/</text><text x="834" y="386" class="s">Muito abaixo do limite de 11 MB.</text>
  <rect x="50" y="458" width="1100" height="86" fill="#fff8c5" stroke="#d4a72c"/><text x="75" y="489" class="t bold">Pasta para My configuration → Folder</text><text x="75" y="520" class="mono">oci-hermes-workshop-resource-manager-folder</text>
  <rect x="50" y="580" width="1100" height="72" rx="4" fill="#312d2a"/><text x="72" y="608" class="call"><tspan font-weight="bold" fill="#f8cf75">Importante:</tspan> não selecione o repositório completo nem uma pasta que contenha .terraform.</text><text x="72" y="634" class="call">Se o navegador abriu a pasta automaticamente, continue normalmente; não é necessário baixar novamente.</text><text x="1010" y="680" class="s">Tela ilustrativa</text>
</svg>
