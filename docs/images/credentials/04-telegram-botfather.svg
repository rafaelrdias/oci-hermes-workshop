<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .bg{fill:#d9e7ef}.phone{fill:#fff;stroke:#2f3d46;stroke-width:4}.head{fill:#4a91c2}.in{fill:#fff;stroke:#d5dce1}.out{fill:#d9fdd3}.h{font:700 23px Arial;fill:#fff}.t{font:18px Arial;fill:#263238}.s{font:15px Arial;fill:#546e7a}.b{font-weight:700}.mono{font:15px Menlo,monospace;fill:#263238}
  </style>
  <rect width="1200" height="760" class="bg"/>
  <rect x="170" y="30" width="860" height="700" rx="28" class="phone"/>
  <rect x="170" y="30" width="860" height="84" rx="26" class="head"/>
  <circle cx="218" cy="72" r="26" fill="#fff"/>
  <text x="207" y="80" font-family="Arial" font-size="24" fill="#4a91c2">B</text>
  <text x="260" y="67" class="h">BotFather ✓</text>
  <text x="260" y="91" font-family="Arial" font-size="15" fill="#e8f4fa">@BotFather</text>
  <rect x="570" y="140" width="410" height="52" rx="12" class="out"/>
  <text x="598" y="173" class="t">/newbot</text>
  <rect x="220" y="215" width="530" height="72" rx="12" class="in"/>
  <text x="245" y="246" class="t">All right, a new bot. How are we</text>
  <text x="245" y="271" class="t">going to call it?</text>
  <rect x="530" y="310" width="450" height="52" rx="12" class="out"/>
  <text x="558" y="343" class="t">Hermes OCI - Rafael</text>
  <rect x="220" y="385" width="630" height="72" rx="12" class="in"/>
  <text x="245" y="416" class="t">Choose a username. It must end in</text>
  <text x="245" y="441" class="mono">bot</text>
  <rect x="470" y="480" width="510" height="52" rx="12" class="out"/>
  <text x="498" y="513" class="mono">hermes_oci_rafael_1234_bot</text>
  <rect x="220" y="555" width="760" height="132" rx="12" class="in"/>
  <text x="245" y="586" class="t b">Done! Congratulations on your new bot.</text>
  <text x="245" y="617" class="mono">t.me/hermes_oci_rafael_1234_bot</text>
  <text x="245" y="648" class="s">Token: &lt;TOKEN_DO_BOT — COPIAR E PROTEGER&gt;</text>
  <text x="245" y="674" class="s">Não compartilhar: quem possui o token controla o bot.</text>
</svg>
