<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .bg{fill:#f5f4f2}.phone{fill:#fff;stroke:#2f3d46;stroke-width:3}.head{fill:#4a91c2}.term{fill:#1f2328}.in{fill:#fff;stroke:#d5dce1}.out{fill:#d9fdd3}.red{fill:#c74634}.h{font:700 22px Arial;fill:#fff}.t{font:17px Arial;fill:#263238}.s{font:14px Arial;fill:#546e7a}.b{font-weight:700}.mono{font:15px Menlo,monospace;fill:#263238}.termtext{font:15px Menlo,monospace;fill:#d9e1e8}.green{fill:#68d391}
  </style>
  <rect width="1200" height="760" class="bg"/>
  <text x="55" y="54" font-family="Arial" font-size="28" font-weight="700" fill="#211f1e">Primeira conversa: abrir → pairing → /new</text>
  <rect x="55" y="85" width="520" height="610" rx="24" class="phone"/>
  <rect x="55" y="85" width="520" height="76" rx="22" class="head"/>
  <text x="92" y="130" class="h">Hermes OCI - Rafael</text>
  <text x="92" y="151" font-family="Arial" font-size="14" fill="#e8f4fa">@hermes_oci_rafael_1234_bot</text>
  <rect x="365" y="190" width="170" height="48" rx="12" class="out"/>
  <text x="395" y="220" class="t">/start</text>
  <rect x="85" y="265" width="420" height="94" rx="12" class="in"/>
  <text x="108" y="295" class="t b">Pairing necessário</text>
  <text x="108" y="324" class="t">Código: TDC-4821</text>
  <text x="108" y="348" class="s">Aprove este código na VM.</text>
  <rect x="365" y="520" width="170" height="48" rx="12" class="out"/>
  <text x="405" y="550" class="t">/new</text>
  <rect x="85" y="592" width="400" height="58" rx="12" class="in"/>
  <text x="108" y="627" class="t b">Nova sessão iniciada ✓</text>
  <rect x="620" y="128" width="525" height="330" rx="9" class="term"/>
  <circle cx="648" cy="153" r="7" fill="#ff6b6b"/>
  <circle cx="670" cy="153" r="7" fill="#f6c344"/>
  <circle cx="692" cy="153" r="7" class="green"/>
  <text x="650" y="205" class="termtext">$ ssh -i &lt;key&gt; opc@&lt;public_ip&gt; \</text>
  <text x="675" y="234" class="termtext"> 'hermes pairing approve telegram TDC-4821'</text>
  <text x="650" y="286" class="termtext">Pairing approved for telegram.</text>
  <text x="650" y="337" class="termtext">$ ssh -i &lt;key&gt; opc@&lt;public_ip&gt; \</text>
  <text x="675" y="366" class="termtext"> 'systemctl is-active hermes-gateway'</text>
  <text x="650" y="418" class="termtext">active</text>
  <rect x="620" y="495" width="525" height="160" rx="8" fill="#e8f4f5" stroke="#92c9cd"/>
  <text x="650" y="535" class="t b">Por que o usuário inicia?</text>
  <text x="650" y="569" class="t">Bots do Telegram não podem começar</text>
  <text x="650" y="596" class="t">uma conversa. Abra o link do BotFather</text>
  <text x="650" y="623" class="t">e envie a primeira mensagem.</text>
</svg>
