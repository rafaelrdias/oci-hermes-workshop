<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .bg{fill:#f5f4f2}.top{fill:#211f1e}.card{fill:#fff;stroke:#d7d3cf;stroke-width:2}.input{fill:#fff;stroke:#8b8580}.red{fill:#c74634}.h{font:700 27px Arial;fill:#211f1e}.t{font:18px Arial;fill:#312d2a}.s{font:15px Arial;fill:#625d58}.w{fill:#fff}.b{font-weight:700}.mono{font:16px Menlo,monospace;fill:#312d2a}
  </style>
  <rect width="1200" height="760" class="bg"/>
  <rect width="1200" height="68" class="top"/>
  <text x="30" y="43" font-family="Arial" font-size="22" font-weight="700" class="w">ORACLE CLOUD</text>
  <text x="870" y="41" font-family="Arial" font-size="17" class="w">US Midwest (Chicago)</text>
  <text x="70" y="116" class="h">Create API key</text>
  <rect x="70" y="140" width="1060" height="544" rx="8" class="card"/>
  <text x="100" y="181" class="t b">Basic information</text>
  <text x="100" y="219" class="s">Name *</text>
  <rect x="100" y="230" width="460" height="42" rx="3" class="input"/>
  <text x="114" y="257" class="t">hermes-workshop-key</text>
  <text x="600" y="219" class="s">Compartment *</text>
  <rect x="600" y="230" width="460" height="42" rx="3" class="input"/>
  <text x="614" y="257" class="t">hermes-workshop</text>
  <text x="100" y="305" class="s">Description</text>
  <rect x="100" y="316" width="960" height="42" rx="3" class="input"/>
  <text x="114" y="343" class="t">Hermes Agent workshop - TDC</text>
  <line x1="100" y1="391" x2="1060" y2="391" stroke="#d7d3cf"/>
  <text x="100" y="430" class="t b">Key names and expiration times</text>
  <text x="100" y="468" class="s">Key one name *</text>
  <rect x="100" y="479" width="460" height="42" rx="3" class="input"/>
  <text x="114" y="506" class="t">workshop-primary</text>
  <text x="600" y="468" class="s">Expiration (UTC)</text>
  <rect x="600" y="479" width="460" height="42" rx="3" class="input"/>
  <text x="614" y="506" class="t">Após o workshop</text>
  <text x="100" y="555" class="s">Key two name *</text>
  <rect x="100" y="566" width="460" height="42" rx="3" class="input"/>
  <text x="114" y="593" class="t">workshop-standby</text>
  <text x="600" y="555" class="s">Expiration (UTC)</text>
  <rect x="600" y="566" width="460" height="42" rx="3" class="input"/>
  <text x="614" y="593" class="t">Após o workshop</text>
  <rect x="883" y="626" width="177" height="42" rx="4" class="red"/>
  <text x="941" y="653" class="t b w">Create</text>
  <text x="100" y="651" class="s">O workshop usará apenas workshop-primary.</text>
  <text x="70" y="720" class="s">Tela ilustrativa — os rótulos podem variar levemente conforme o idioma da Console.</text>
</svg>
